# Deploy TeamVOC Updates (robte425-code/teamupdates) to Vercel on push to main.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#
# Flow matches Vercel’s guide (pull → build → deploy --prebuilt):
# https://vercel.com/guides/how-can-i-use-github-actions-with-vercel

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Remove stale Vercel link
        run: rm -rf .vercel

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@50.37.2

      - name: Pull Vercel env & link project
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Production env & database prep
        run: |
          vercel env pull .env --environment=production --yes --token=${{ secrets.VERCEL_TOKEN }}
          set -a
          source .env
          set +a
          # Migrate outside `npm run build` to avoid Neon advisory-lock timeouts during
          # vercel build. Retry with backoff; do not block deploy if schema is current.
          for attempt in 1 2 3 4 5; do
            if npx prisma migrate deploy; then
              echo "Migrations applied (or already up to date)."
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Migrate failed after 5 attempts; checking status..."
              npx prisma migrate status || true
            else
              echo "Migrate attempt $attempt failed; waiting 30s..."
              sleep 30
            fi
          done
          npx tsx scripts/import-env-admins-once.ts || echo "Admin import skipped."
          npx tsx scripts/import-env-super-admins-once.ts || echo "Super admin import skipped."
          npx tsx scripts/sync-super-admin-app-access.ts || echo "Super admin app sync skipped."

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
