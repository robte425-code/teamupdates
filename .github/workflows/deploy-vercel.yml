# Deploy TeamVOC Updates (this repo: robte425-code/teamupdates) to Vercel on push to main.
# Add repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Vercel → Project Settings → General, or run `npx vercel link` in this repo.)

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # If `.vercel` were ever committed, the CLI prefers it over env and can fail with
      # "Could not retrieve Project Settings" (https://vercel.link/cannot-load-project-settings).
      - name: Remove local Vercel link
        run: rm -rf .vercel

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: 50.37.2
          vercel-args: "--prod"
          working-directory: ./
