# Monthly credential expiry report for TEAM secrets.
#
# Required GitHub secrets:
#   AZURE_GRAPH_CLIENT_ID      — Entra app with Application.Read.All (see docs/CREDENTIAL_ROTATION.md)
#   AZURE_GRAPH_CLIENT_SECRET
#   AZURE_GRAPH_TENANT_ID
#   AZURE_APP_CLIENT_ID          — TEAM SSO app client ID to inspect (same as AZURE_AD_CLIENT_ID)
#
# Optional:
#   VERCEL_TOKEN                 — list deploy token expiration dates
#   RESEND_API_KEY               — send alert email when credentials are within threshold
#   CREDENTIAL_ALERT_TO          — comma-separated recipients (falls back to ADMIN_EMAILS)
#   EMAIL_FROM                   — Resend From header (must be verified domain)
#   SLACK_WEBHOOK_URL            — incoming webhook for Slack alerts

name: Credential expiry report

on:
  schedule:
    # 09:00 UTC on the 1st of each month
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate report
        env:
          AZURE_GRAPH_CLIENT_ID: ${{ secrets.AZURE_GRAPH_CLIENT_ID }}
          AZURE_GRAPH_CLIENT_SECRET: ${{ secrets.AZURE_GRAPH_CLIENT_SECRET }}
          AZURE_GRAPH_TENANT_ID: ${{ secrets.AZURE_GRAPH_TENANT_ID }}
          AZURE_APP_CLIENT_ID: ${{ secrets.AZURE_APP_CLIENT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CREDENTIAL_ALERT_TO: ${{ secrets.CREDENTIAL_ALERT_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          node scripts/credential-expiry-report.mjs --days 60 --out credential-expiry-report.md --notify
          echo "---"
          cat credential-expiry-report.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: credential-expiry-report
          path: credential-expiry-report.md
          retention-days: 90
